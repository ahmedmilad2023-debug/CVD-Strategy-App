<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Volume-Trend OB Engine | BigBeluga</title>
  <link rel="manifest" href="data:application/json,{}" id="manifestLink">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ... (بقية الـ CSS كما هي، فقط أضف هذا في نهاية الـ CSS) ... */
    .error-message {
      background: #ff444422;
      border: 1px solid #ff4444;
      color: #ff4444;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 10px;
      display: none;
    }
    .error-message.visible { display: block; }
    .reconnect-btn {
      background: #1f2937;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 4px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div class="app-wrapper" id="app">
  <!-- ... (باقي الهيكل كما هو) ... -->
  
  <!-- أضف هذا الزر في لوحة الإعدادات أو في مكان قريب من حالة الاتصال -->
  <div class="signal-panel">
    <span class="text-muted">الإشارة الحالية:</span>
    <span class="signal-badge neutral" id="signalBadge">محايد</span>
    <span class="text-muted">|</span>
    <span class="flex-center"><span class="status-dot offline" id="statusDot"></span> <span id="statusText">غير متصل</span>
      <button id="manualReconnectBtn" class="reconnect-btn"><i class="fas fa-sync"></i> إعادة الاتصال</button>
    </span>
    <span class="text-muted">|</span>
    <span class="flex-center"><i class="fas fa-chart-simple"></i> ADX: <strong id="adxValue">0.0</strong></span>
    <span class="flex-center"><i class="fas fa-arrow-trend-up"></i> الاتجاه: <strong id="trendLabel">محايد</strong></span>
  </div>
  
  <div id="connectionError" class="error-message">⚠️ فشل الاتصال بـ Binance. جاري محاولة إعادة الاتصال...</div>

  <!-- ... (باقي الهيكل) ... -->
</div>

<!-- ============================================================ -->
<!-- ===== JAVASCRIPT المُحسّن ===== -->
<!-- ============================================================ -->
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
  (function() {
    'use strict';

    // ... (باقي المتغيرات كما هي) ...

    // دالة جديدة للتحقق من الاتصال بالإنترنت
    function checkNetworkAndReconnect() {
      if (!navigator.onLine) {
        setStatus('offline', 'لا يوجد اتصال بالإنترنت');
        return false;
      }
      return true;
    }

    // تحديث دالة الاتصال (connectBinance) لتكون أكثر قوة
    function connectBinance() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        console.log('WebSocket already connected or connecting.');
        return;
      }

      if (!checkNetworkAndReconnect()) return;

      const sym = symbol.toLowerCase();
      const stream = `wss://stream.binance.com:9443/ws/${sym}@kline_${INTERVAL}`;
      
      try {
        ws = new WebSocket(stream);
      } catch (e) {
        console.error('Failed to create WebSocket:', e);
        setStatus('offline', 'خطأ في إنشاء الاتصال');
        showError('فشل إنشاء اتصال WebSocket. تحقق من الشبكة.');
        setTimeout(connectBinance, 3000);
        return;
      }

      ws.onopen = () => {
        console.log('✅ Binance WebSocket connected');
        isConnected = true;
        setStatus('online', 'متصل');
        hideError();
        // إلغاء أي مؤقت إعادة اتصال
        if (window.reconnectTimer) {
          clearTimeout(window.reconnectTimer);
          window.reconnectTimer = null;
        }
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.e === 'kline') {
            const k = data.k;
            const candle = {
              time: k.t,
              open: parseFloat(k.o),
              high: parseFloat(k.h),
              low: parseFloat(k.l),
              close: parseFloat(k.c),
              volume: parseFloat(k.v)
            };
            if (k.x) {
              processNewCandle(candle);
            }
          }
        } catch (e) {
          console.error('WS message error:', e);
        }
      };

      ws.onerror = (err) => {
        console.error('❌ WebSocket error:', err);
        // لا نقوم بقطع الاتصال هنا، نتركه للـ onclose
      };

      ws.onclose = (event) => {
        isConnected = false;
        setStatus('offline', 'غير متصل');
        console.warn(`WebSocket closed (code: ${event.code}). Reconnecting in 3s...`);
        
        // إذا كان الإغلاق طبيعياً (1000) فلا داعي لإعادة الاتصال الفوري
        // ولكن إذا كان خطأ (مثل 1006) نعيد المحاولة
        if (event.code !== 1000) {
          showError('انقطع الاتصال بـ Binance. جاري إعادة المحاولة...');
          if (window.reconnectTimer) clearTimeout(window.reconnectTimer);
          window.reconnectTimer = setTimeout(connectBinance, 3000);
        } else {
          hideError();
        }
      };
    }

    // دوال مساعدة للواجهة
    function setStatus(type, text) {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      const chartDot = document.getElementById('chartStatusDot');
      const chartTxt = document.getElementById('chartStatusText');
      
      if (type === 'online') {
        dot.className = 'status-dot online';
        chartDot.className = 'status-dot online';
        txt.textContent = text;
        chartTxt.textContent = 'متصل';
      } else {
        dot.className = 'status-dot offline';
        chartDot.className = 'status-dot offline';
        txt.textContent = text;
        chartTxt.textContent = 'غير متصل';
      }
    }

    function showError(msg) {
      const el = document.getElementById('connectionError');
      el.textContent = '⚠️ ' + msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('connectionError').classList.remove('visible');
    }

    // دالة تحميل البيانات التاريخية (تم تحسينها للتعامل مع الأخطاء)
    async function loadHistoricalData() {
      const sym = symbol;
      const limit = 300;
      const url = `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${INTERVAL}&limit=${limit}`;
      try {
        setStatus('offline', 'جاري تحميل البيانات...');
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP error! status: ${resp.status}`);
        const data = await resp.json();
        candles = data.map(item => ({
          time: item[0],
          open: parseFloat(item[1]),
          high: parseFloat(item[2]),
          low: parseFloat(item[3]),
          close: parseFloat(item[4]),
          volume: parseFloat(item[5])
        }));
        let indData = computeIndicators(candles);
        if (indData) {
          updateChart(candles, indData);
          hideError();
        }
        console.log('✅ Historical data loaded:', candles.length);
        return true;
      } catch (e) {
        console.error('❌ Failed to load historical data:', e);
        showError('فشل تحميل البيانات التاريخية. تأكد من اتصال الشبكة.');
        setStatus('offline', 'خطأ في التحميل');
        return false;
      }
    }

    // دالة التهيئة (تم تحسين الترتيب)
    async function init() {
      loadSettings();
      initChart();

      // محاولة تحميل البيانات التاريخية أولاً
      const histLoaded = await loadHistoricalData();
      
      // ثم الاتصال بـ WebSocket
      if (histLoaded) {
        connectBinance();
      } else {
        // إذا فشل التحميل، نحاول مرة أخرى بعد 5 ثوانٍ
        setTimeout(() => {
          loadHistoricalData().then(() => connectBinance());
        }, 5000);
      }

      // ربط زر إعادة الاتصال اليدوي
      document.getElementById('manualReconnectBtn').addEventListener('click', () => {
        if (ws) {
          ws.close(1000, 'Manual reconnect');
          ws = null;
        }
        if (window.reconnectTimer) {
          clearTimeout(window.reconnectTimer);
          window.reconnectTimer = null;
        }
        hideError();
        setStatus('offline', 'جاري إعادة الاتصال...');
        loadHistoricalData().then(() => connectBinance());
      });

      // مراقبة تغيير حالة الشبكة (عند عودة الإنترنت)
      window.addEventListener('online', () => {
        console.log('Network is back online. Reconnecting...');
        hideError();
        if (ws) ws.close(1000, 'Network online');
        setTimeout(() => connectBinance(), 1000);
      });

      // ... (باقي أحداث الإعدادات والمشاركة كما هي) ...
      
      // حفظ الإعدادات وتحديث الرمز
      const saveDebounced = () => {
        saveSettings();
        if (ws) {
          ws.close(1000, 'Settings changed');
          ws = null;
        }
        if (window.reconnectTimer) {
          clearTimeout(window.reconnectTimer);
          window.reconnectTimer = null;
        }
        loadHistoricalData().then(() => connectBinance());
      };
      
      // ... (باقي الكود) ...
      updateUI();
    }

    // ... (باقي الكود) ...
    // بدء التطبيق
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
</script>
</body>
</html>
