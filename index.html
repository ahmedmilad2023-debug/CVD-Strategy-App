<style>
*{margin:0;padding:0;box-sizing:border-box;overflow-x:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{background:#0d0d0d;color:#e0e0e0;padding:8px;overflow-x:hidden;}
.container{max-width:600px;margin:0 auto;padding-bottom:80px;}
h1{font-size:1.6rem;color:#f0c27a;text-align:center;margin:10px 0;}
h2{font-size:1.2rem;color:#ccc;margin:10px 0 5px;border-bottom:1px solid #333;padding-bottom:5px;}
.symbol-picker{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.symbol-picker button{background:#222;border:1px solid #444;color:#ddd;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.9rem;}

.chart-container{background:#1a1a1a;border-radius:12px;padding:6px;margin:12px 0;height:250px;position:relative;}
#tradingview-widget{width:100%;height:100%;min-height:220px;}
.signals-table{width:100%;border-collapse:collapse;font-size:0.8rem;margin:10px 0;}
.signals-table th{background:#222;padding:6px;text-align:center;border:1px solid #333;}
.signals-table td{background:#111;padding:6px;border:1px solid #333;word-break:break-word;vertical-align:top;}
.signals-table tr.buy td{border-right:3px solid #4caf50;}
.signals-table tr.sell td{border-right:3px solid #f44336;}
.signal-card{background:#1a1a1a;border-radius:12px;padding:12px;margin:8px 0;border-left:6px solid #f0c27a;}
.signal-card.buy{border-left-color:#4caf50;}

.signal-card .header{display:flex;justify-content:space-between;flex-wrap:wrap;}
.signal-card .side{font-weight:bold;font-size:1.1rem;}

.signal-card .actions button{background:#333;border:none;color:#eee;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:0.8rem;}
.signal-card .actions button.primary{background:#f0c27a;color:#000;}
.signal-card .note-input{width:100%;background:#0d0d0d;border:1px solid #333;color:#ddd;padding:6px;border-radius:8px;margin-top:4px;resize:vertical;font-size:0.8rem;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 24px;border-radius:30px;font-size:0.9rem;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.6);transition:opacity 0.3s;opacity:0;pointer-events:none;}
.toast.show{opacity:1;}
.footer{text-align:center;color:#555;font-size:0.7rem;margin:20px 0 10px;}
@media(max-width:480px){.price-bar .price{font-size:1.4rem;}.metrics{grid-template-columns:1fr 1fr;}.signal-card .details{grid-template-columns:1fr 1fr;}}

<body>
<div class="container" id="app">
<h1>📊 PWA تداول - Supply/Demand + CVD</h1>
<div class="symbol-picker" id="symbolPicker">
<button data-sym="BTCUSDT" class="active">BTC</button>
<button data-sym="ETHUSDT">ETH</button>
<button data-sym="BNBUSDT">BNB</button>
<button data-sym="SOLUSDT">SOL</button>
<button data-sym="XRPUSDT">XRP</button>
</div>
<div class="price-bar">
<span class="price" id="currentPrice">---</span>
<span class="change" id="priceChange">0.00%</span>
</div>
<div class="metrics">
<div class="metric"><div class="label">CVD (تراكمي)</div><div class="value" id="cvdValue">0</div></div>
<div class="metric"><div class="label">حجم 24h</div><div class="value" id="volumeValue">---</div></div>
<div class="metric"><div class="label">الطلب/العرض</div><div class="value" id="sdLevel">---</div></div>
</div>
<div class="chart-container">
<div id="tradingview-widget">جاري تحميل الرسم البياني...</div>
</div>
<h2>📈 إشارات التداول الفورية</h2>
<div id="signalsContainer"></div>
</div>
<div class="toast" id="toast"></div>
<div class="footer">PWA متكامل - بيانات من Binance | استراتيجية Supply & Demand + CVD</div>
<script>
// ===== بداية الكود الطويل - كل سطر من أقصى اليسار =====
// متغيرات عامة
let currentSymbol='BTCUSDT';
let priceHistory=[];
let cvdHistory=[];
let signals=[];
let lastPrice=0;
let lastCVD=0;
let intervalId=null;
let chartWidget=null;
let toastTimer=null;
// دالة عرض رسالة
function showToast(msg){
let t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
if(toastTimer)clearTimeout(toastTimer);
toastTimer=setTimeout(()=>{t.classList.remove('show');},4000);
}
// دالة جلب البيانات من Binance (سعر الحالي، حجم، تغير)
async function fetchBinanceData(sym){
try{
let url='https://api.binance.com/api/v3/ticker/24hr?symbol='+sym;
let resp=await fetch(url);
if(!resp.ok)throw new Error('Binance 24hr error');
let data=await resp.json();
let price=parseFloat(data.lastPrice);
let change=parseFloat(data.priceChangePercent);
let volume=parseFloat(data.quoteVolume);
let high=parseFloat(data.highPrice);
let low=parseFloat(data.lowPrice);
// تحديث الواجهة
document.getElementById('currentPrice').textContent='$'+price.toFixed(2);
let el=document.getElementById('priceChange');
el.textContent=(change>=0?'+':'')+change.toFixed(2)+'%';
el.className='change '+(change>=0?'positive':'negative');
document.getElementById('volumeValue').textContent=(volume/1e6).toFixed(2)+'M';
// حساب CVD محاكي (يعتمد على التغير والسعر)
let cvd=0;
if(priceHistory.length>0){
let delta=price-lastPrice;
// CVD = تراكمي لحجم * إشارة اتجاه (محاكاة)
let volDelta=volume*0.000001; // تصغير
if(delta>0)cvd=lastCVD+volDelta*0.5;
else if(delta<0)cvd=lastCVD-volDelta*0.5;
else cvd=lastCVD;
}else{
cvd=volume*0.00001;
}
cvd=Math.round(cvd*100)/100;
lastCVD=cvd;
lastPrice=price;
document.getElementById('cvdValue').textContent=cvd.toFixed(2);
// تخزين للتحليل
priceHistory.push(price);
if(priceHistory.length>200)priceHistory.shift();
cvdHistory.push(cvd);
if(cvdHistory.length>200)cvdHistory.shift();
// تحديث مستويات العرض والطلب (محاكاة)
let sd='--';
if(priceHistory.length>20){
let max=Math.max(...priceHistory.slice(-20));
let min=Math.min(...priceHistory.slice(-20));
let range=max-min;
if(range>0){
let pos=(price-min)/range;
if(pos>0.7)sd='منطقة عرض (مقاومة)';
else if(pos<0.3)sd='منطقة طلب (دعم)';
else sd='محايد';
}
}
document.getElementById('sdLevel').textContent=sd;
// استراتيجية Supply & Demand + CVD - توليد إشارات
generateSignal(price, cvd, change, volume, high, low);
// تحديث جدول الإشارات
renderSignals();
}catch(e){
console.warn('Binance fetch error:',e);
showToast('خطأ في جلب البيانات: '+e.message);
}
}
// دالة توليد الإشارة بناءً على CVD و مستويات
function generateSignal(price, cvd, change, volume, high, low){
// شرط بيع: CVD سالب + سعر قرب مقاومة (عرض) + تغير سلبي
// شراء: CVD موجب + سعر قرب دعم + تغير إيجابي
let side=null;
let entry=price;
let tp=0;
let sl=0;
let analysis='';
let now=new Date();
let timeStr=now.toLocaleString('ar-EG',{hour12:false});
// حساب مستويات ديناميكية
let recent=priceHistory.slice(-30);
if(recent.length<10)return;
let max=Math.max(...recent);
let min=Math.min(...recent);
let range=max-min;
if(range<0.001)return;
let pos=(price-min)/range; // 0-1
// CVD trend: مقارنة متوسط CVD آخر 5 مع آخر 10
let cvdShort=cvdHistory.slice(-5);
let cvdLong=cvdHistory.slice(-10);
let avgShort=0,avgLong=0;
if(cvdShort.length>0)avgShort=cvdShort.reduce((a,b)=>a+b,0)/cvdShort.length;
if(cvdLong.length>0)avgLong=cvdLong.reduce((a,b)=>a+b,0)/cvdLong.length;
let cvdTrend=avgShort-avgLong; // إيجابي يعني صاعد
// شروط البيع (Supply)
if(pos>0.75 && cvdTrend<0 && change<0){
side='sell';
tp=price-(range*0.15);
sl=price+(range*0.08);
analysis='منطقة عرض قوية (مقاومة) مع تراجع CVD ومؤشر سلبي، ضغط بيع متوقع.';
}
// شروط الشراء (Demand)
else if(pos<0.25 && cvdTrend>0 && change>0){
side='buy';
tp=price+(range*0.15);
sl=price-(range*0.08);
analysis='منطقة طلب قوية (دعم) مع ارتفاع CVD ومؤشر إيجابي، ضغط شراء متوقع.';
}
// إشارة إضافية: اختراق مع CVD
else if(cvdTrend>0.5 && change>1.5 && pos<0.6){
side='buy';
tp=price+(range*0.12);
sl=price-(range*0.06);
analysis='اختراق صاعد مع CVD مرتفع، زخم شراء.';
}
else if(cvdTrend<-0.5 && change<-1.5 && pos>0.4){
side='sell';
tp=price-(range*0.12);
sl=price+(range*0.06);
analysis='اختراق هابط مع CVD منخفض، زخم بيع.';
}
if(!side)return;
// التأكد من عدم تكرار إشارة قريبة (خلال 5 دقائق)
let lastSignal=signals.length>0?signals[signals.length-1]:null;
if(lastSignal){
let lastTime=new Date(lastSignal.time);
let diff=(now-lastTime)/60000;
if(diff<2)return; // تكرار قريب
}
// إنشاء الإشارة
let signal={
id:Date.now(),
symbol:currentSymbol,
side:side,
entry:Math.round(entry*100)/100,
tp:Math.round(tp*100)/100,
sl:Math.round(sl*100)/100,
time:now.toISOString(),
timeStr:timeStr,
analysis:analysis,
note:'',
alertActive:false
};
signals.push(signal);
if(signals.length>50)signals.shift(); // حد أقصى
showToast('🔔 إشارة '+ (side==='buy'?'شراء':'بيع') +' جديدة!');
// تفعيل تنبيه المتصفح إذا كان مسموحاً
if('Notification' in window && Notification.permission==='granted'){
new Notification('إشارة تداول',{
body:side==='buy'?'شراء عند '+entry:'بيع عند '+entry,
icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23f0c27a"/><text x="50" y="65" font-size="60" text-anchor="middle" fill="%231a1a1a">D</text></svg>'
});
}
// تحديث الواجهة
renderSignals();
}
// عرض الإشارات في الجدول والكروت
function renderSignals(){
let container=document.getElementById('signalsContainer');
if(!container)return;
if(signals.length===0){
container.innerHTML='<p style="color:#666;text-align:center;padding:20px;">لا توجد إشارات حتى الآن. انتظار تحليل السوق...</p>';
return;
}
let html='<table class="signals-table"><thead><tr><th>التاريخ</th><th>الاتجاه</th><th>الدخول</th><th>TP</th><th>SL</th><th>التحليل</th></tr></thead><tbody>';
// عرض آخر 10 إشارات
let list=signals.slice(-10).reverse();
list.forEach(s=>{
let cls=s.side==='buy'?'buy':'sell';
let sideText=s.side==='buy'?'شراء':'بيع';
html+='<tr class="'+cls+'">';
html+='<td>'+s.timeStr+'</td>';
html+='<td>'+sideText+'</td>';
html+='<td>'+s.entry+'</td>';
html+='<td>'+s.tp+'</td>';
html+='<td>'+s.sl+'</td>';
html+='<td style="font-size:0.7rem;">'+s.analysis.substring(0,30)+'...</td>';
html+='</tr>';
});
html+='</tbody></table>';
// إضافة الكروت
html+='<div style="margin-top:10px;">';
list.forEach(s=>{
let cls=s.side==='buy'?'buy':'sell';
let sideText=s.side==='buy'?'🟢 شراء':'🔴 بيع';
html+='<div class="signal-card '+cls+'">';
html+='<div class="header"><span class="side">'+sideText+'</span><span class="time">'+s.timeStr+'</span></div>';
html+='<div class="details">';
html+='<div><div class="label">الدخول</div><div class="val">'+s.entry+'</div></div>';
html+='<div><div class="label">هدف الربح</div><div class="val">'+s.tp+'</div></div>';
html+='<div><div class="label">وقف الخسارة</div><div class="val">'+s.sl+'</div></div>';
html+='</div>';
html+='<div class="analysis">📝 '+s.analysis+'</div>';
html+='<div class="actions">';
html+='<button class="primary" onclick="shareSignal(\''+s.id+'\')">📤 مشاركة</button>';
html+='<button onclick="toggleAlert(\''+s.id+'\')">🔔 '+ (s.alertActive?'إلغاء التنبيه':'تفعيل التنبيه') +'</button>';
html+='</div>';
html+='<textarea class="note-input" placeholder="أضف ملاحظتك هنا..." onchange="updateNote(\''+s.id+'\',this.value)">'+s.note+'</textarea>';
html+='</div>';
});
html+='</div>';
container.innerHTML=html;
}
// دوال تفاعل الأزرار
function shareSignal(id){
let sig=signals.find(s=>s.id==parseInt(id));
if(!sig){showToast('الإشارة غير موجودة');return;}
let txt='إشارة تداول - '+sig.symbol+'\nالاتجاه: '+(sig.side==='buy'?'شراء':'بيع')+'\nالدخول: '+sig.entry+'\nTP: '+sig.tp+'\nSL: '+sig.sl+'\nالتحليل: '+sig.analysis;
if(navigator.share){
navigator.share({title:'إشارة تداول',text:txt}).catch(()=>{});
}else{
navigator.clipboard.writeText(txt).then(()=>{showToast('تم نسخ الإشارة للحافظة');}).catch(()=>{showToast('اضغط مع الاستمرار للنسخ');});
}
}
function toggleAlert(id){
let sig=signals.find(s=>s.id==parseInt(id));
if(!sig)return;
sig.alertActive=!sig.alertActive;
if(sig.alertActive){
if('Notification' in window && Notification.permission==='default'){
Notification.requestPermission().then(perm=>{
if(perm==='granted'){showToast('تم تفعيل التنبيهات لهذه الصفقة');}
else{showToast('الرجاء السماح بالتنبيهات في المتصفح');sig.alertActive=false;renderSignals();}
});
}else if('Notification' in window && Notification.permission==='granted'){
showToast('🔔 تم تفعيل التنبيه لهذه الصفقة');
}else{
showToast('التنبيهات غير مدعومة أو ممنوعة');
sig.alertActive=false;
}
}else{
showToast('تم إلغاء التنبيه');
}
renderSignals();
}
function updateNote(id,val){
let sig=signals.find(s=>s.id==parseInt(id));
if(sig){sig.note=val;}
}
// دالة تحميل TradingView widget مع معالجة الأخطاء
function loadTradingView(){
try{
let script=document.createElement('script');
script.src='https://s3.tradingview.com/tv.js';
script.async=true;
script.onload=function(){
if(typeof TradingView!=='undefined' && TradingView.widget){
new TradingView.widget({
'autosize':true,
'symbol': 'BINANCE:'+currentSymbol,
'interval': '5',
'timezone': 'Etc/UTC',
'theme': 'dark',
'style': '1',
'locale': 'ar',
'toolbar_bg': '#1a1a1a',
'enable_publishing': false,
'hide_side_toolbar': false,
'allow_symbol_change': true,
'container_id': 'tradingview-widget',
'studies': ['Volume@tv-basicstudies']
});
}else{
document.getElementById('tradingview-widget').innerHTML='<div style="color:#888;text-align:center;padding:40px;">تعذر تحميل TradingView، استخدم البيانات النصية</div>';
}
};
script.onerror=function(){
document.getElementById('tradingview-widget').innerHTML='<div style="color:#888;text-align:center;padding:40px;">⚠️ خطأ في تحميل الرسم البياني، ولكن التطبيق يعمل.</div>';
};
document.head.appendChild(script);
}catch(e){
document.getElementById('tradingview-widget').innerHTML='<div style="color:#888;text-align:center;padding:40px;">⚠️ خطأ: '+e.message+'</div>';
}
}
// تغيير الرمز
function changeSymbol(sym){
currentSymbol=sym;
document.querySelectorAll('.symbol-picker button').forEach(b=>{
b.classList.toggle('active',b.dataset.sym===sym);
});
// إعادة تحميل الرسم البياني إذا كان موجوداً
let container=document.getElementById('tradingview-widget');
container.innerHTML='جاري تحميل الرسم البياني...';
// إزالة script السابق (بسيط)
loadTradingView();
// تحديث البيانات فوراً
fetchBinanceData(sym);
showToast('تم التبديل إلى '+sym);
}
// تسجيل service worker (PWA)
function registerSW(){
if('serviceWorker' in navigator){
navigator.serviceWorker.register('data:text/javascript,'+encodeURIComponent(`
self.addEventListener('install',e=>{e.waitUntil(self.skipWaiting());});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('Offline',{status:503})));});
`)).then(()=>{console.log('SW registered');}).catch(()=>{});
}
}
// بدء التطبيق
function init(){
// طلب إذن التنبيهات
if('Notification' in window && Notification.permission==='default'){
Notification.requestPermission();
}
// اختيار الرمز
document.querySelectorAll('.symbol-picker button').forEach(btn=>{
btn.addEventListener('click',function(){changeSymbol(this.dataset.sym);});
});
// تحميل الرسم البياني
loadTradingView();
// جلب البيانات أول مرة
fetchBinanceData(currentSymbol);
// تحديث كل 10 ثواني
if(intervalId)clearInterval(intervalId);
intervalId=setInterval(()=>{fetchBinanceData(currentSymbol);},10000);
// تسجيل الـ SW
registerSW();
// إظهار رسالة ترحيب
showToast('🚀 جاهز للتداول - استراتيجية Supply/Demand + CVD');
}
// عند تحميل الصفحة
if(document.readyState==='loading'){
document.addEventListener('DOMContentLoaded',init);
}else{
init();
}
// نهاية الكود - كل سطر من أقصى اليسار
</script>
</body>
</html>
