    <script>
        /* =================================================================
           UT Bot Alerts Strategy (Pine Script v4 → JS) 
           مع ADX > 25 ، إطار 30 دقيقة ، إدارة صفقات تلقائية
           يعمل على Binance WebSocket (بيانات الشموع)
           ================================================================= */

        // ---------- الإعدادات ----------
        const SYMBOLS = [
            'BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT',
            'ADAUSDT', 'DOGEUSDT', 'AVAXUSDT', 'DOTUSDT', 'MATICUSDT'
        ];
        const TIMEFRAME = '30m'; // 30 دقيقة
        const ADX_THRESHOLD = 25;
        const STOP_LOSS_PCT = 0.005; // 0.5%
        const TAKE_PROFIT_PCT = 0.02; // 2%
        const MAX_CANDLES = 300;

        // UT Bot Settings
        const UT_A = 1.0;      // Key Value (حساسية)
        const UT_C = 10;       // ATR Period
        const UT_HA = false;   // استخدام Heikin Ashi (false للشموع العادية)

        // ---------- حالة التطبيق ----------
        let activeSymbol = 'BTCUSDT';
        let marketData = {}; // symbol -> { candles: [{open,high,low,close,volume,time}], indicators: {...} }
        let trades = [];
        let activeTrade = null; // {symbol, side, entryPrice, stopLoss, takeProfit, timestamp}
        let isAutoScan = true;
        let ws = null;
        let chartCtx = null;
        let canvas = document.getElementById('chartCanvas');

        // ---------- دوال مساعدة ----------
        function formatPrice(p) { return p.toFixed(2); }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        }

        // ---------- حساب ATR ----------
        function calcATR(candles, period = 14) {
            if (candles.length < period + 1) return 0;
            let tr = [];
            for (let i = 1; i < candles.length; i++) {
                const h = candles[i].high,
                    l = candles[i].low,
                    pc = candles[i - 1].close;
                tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            if (tr.length < period) return 0;
            let atr = tr.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < tr.length; i++) {
                atr = (atr * (period - 1) + tr[i]) / period;
            }
            return atr;
        }

        // ---------- ADX حساب ----------
        function calcADX(candles, period = 14) {
            if (candles.length < period + 2) return 0;
            let tr = [],
                plusDM = [],
                minusDM = [];
            for (let i = 1; i < candles.length; i++) {
                const h = candles[i].high,
                    l = candles[i].low,
                    pc = candles[i - 1].close;
                tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
                const up = h - candles[i - 1].high;
                const down = candles[i - 1].low - l;
                plusDM.push(up > down && up > 0 ? up : 0);
                minusDM.push(down > up && down > 0 ? down : 0);
            }
            let atr = tr.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let pdi = plusDM.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let mdi = minusDM.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < tr.length; i++) {
                atr = (atr * (period - 1) + tr[i]) / period;
                pdi = (pdi * (period - 1) + plusDM[i]) / period;
                mdi = (mdi * (period - 1) + minusDM[i]) / period;
            }
            const dx = (pdi + mdi === 0) ? 0 : Math.abs(pdi - mdi) / (pdi + mdi) * 100;
            let adx = dx;
            for (let i = period + 1; i < tr.length; i++) {
                const dx2 = (pdi + mdi === 0) ? 0 : Math.abs(pdi - mdi) / (pdi + mdi) * 100;
                adx = (adx * (period - 1) + dx2) / period;
                const idx = i;
                if (idx < plusDM.length) {
                    pdi = (pdi * (period - 1) + plusDM[idx]) / period;
                    mdi = (mdi * (period - 1) + minusDM[idx]) / period;
                }
            }
            return adx;
        }

        // ---------- UT Bot Alerts ----------
        function calcUTBot(candles, a = UT_A, c = UT_C, useHeikinAshi = UT_HA) {
            if (candles.length < c + 2) return { pos: 0, stop: 0, src: 0 };

            // تحضير مصدر السعر (src)
            let srcArray = [];
            if (useHeikinAshi) {
                // حساب شموع Heikin Ashi
                let haOpen = candles[0].open,
                    haClose = candles[0].close;
                for (let i = 0; i < candles.length; i++) {
                    const o = candles[i].open,
                        h = candles[i].high,
                        l = candles[i].low,
                        cl = candles[i].close;
                    const haC = (o + h + l + cl) / 4;
                    const haO = (i === 0) ? (o + cl) / 2 : (haOpen + haClose) / 2;
                    // نقوم بتبسيط: نأخذ فقط الـ haClose باعتبارها src
                    srcArray.push(haC);
                    haOpen = haO;
                    haClose = haC;
                }
            } else {
                srcArray = candles.map(c => c.close);
            }

            // حساب ATR
            const atr = calcATR(candles, c);
            if (atr === 0) return { pos: 0, stop: 0, src: srcArray[srcArray.length - 1] };

            const nLoss = a * atr;
            let stop = 0;
            let pos = 0; // 1 = buy, -1 = sell

            for (let i = 0; i < srcArray.length; i++) {
                const src = srcArray[i];
                const prevSrc = i > 0 ? srcArray[i - 1] : src;
                const prevStop = stop;
                const prevPos = pos;

                // تحديث الـ stop
                if (prevPos === 0) {
                    // بداية
                    stop = src - nLoss;
                    pos = 1; // افتراضي
                } else if (prevPos === 1) {
                    // اتجاه صاعد
                    if (src > prevStop && prevSrc > prevStop) {
                        stop = Math.max(prevStop, src - nLoss);
                    } else if (src > prevStop) {
                        stop = src - nLoss;
                    } else {
                        // تغيير الاتجاه
                        stop = src + nLoss;
                        pos = -1;
                    }
                } else if (prevPos === -1) {
                    // اتجاه هابط
                    if (src < prevStop && prevSrc < prevStop) {
                        stop = Math.min(prevStop, src + nLoss);
                    } else if (src < prevStop) {
                        stop = src + nLoss;
                    } else {
                        // تغيير الاتجاه
                        stop = src - nLoss;
                        pos = 1;
                    }
                }

                // التحقق من التقاطع لتحديث pos (منطق أكثر دقة)
                if (i > 0) {
                    const prevSrcVal = srcArray[i - 1];
                    const prevStopVal = stop; // نستخدم الـ stop المحسوب للشمعة السابقة
                    // نقوم بحساب stop للشمعة السابقة بشكل منفصل لضمان الدقة
                }
            }

            // إعادة الحساب بشكل تكراري دقيق (محاكاة Pine Script)
            let p = 0;
            let s = 0;
            for (let i = 0; i < srcArray.length; i++) {
                const src = srcArray[i];
                const prevSrc = i > 0 ? srcArray[i - 1] : src;
                const prevS = s;
                const prevP = p;

                let newS = 0;
                if (prevP === 0) {
                    newS = src - nLoss;
                    p = 1;
                } else if (prevP === 1) {
                    if (src > prevS && prevSrc > prevS) {
                        newS = Math.max(prevS, src - nLoss);
                    } else if (src > prevS) {
                        newS = src - nLoss;
                    } else {
                        newS = src + nLoss;
                        p = -1;
                    }
                } else if (prevP === -1) {
                    if (src < prevS && prevSrc < prevS) {
                        newS = Math.min(prevS, src + nLoss);
                    } else if (src < prevS) {
                        newS = src + nLoss;
                    } else {
                        newS = src - nLoss;
                        p = 1;
                    }
                }
                s = newS;
            }

            // إشارة الشراء/البيع بناءً على تغير الاتجاه (تقاطع)
            const lastSrc = srcArray[srcArray.length - 1];
            const prevSrc = srcArray.length > 1 ? srcArray[srcArray.length - 2] : lastSrc;
            const prevStop = s; // سيكون الـ stop للشمعة السابقة، لكننا بحاجة لحسابه بدقة
            // سنقوم بتخزين قيمة الـ stop السابقة أثناء التكرار
            let prevStopVal = 0;
            let lastStopVal = 0;
            p = 0;
            s = 0;
            for (let i = 0; i < srcArray.length; i++) {
                const src = srcArray[i];
                const prevSrcVal = i > 0 ? srcArray[i - 1] : src;
                const prevSVal = s;
                const prevPVal = p;
                if (i === srcArray.length - 1) {
                    lastStopVal = s;
                }
                if (i === srcArray.length - 2) {
                    prevStopVal = s;
                }
                // حساب جديد
                let newS = 0;
                if (prevPVal === 0) {
                    newS = src - nLoss;
                    p = 1;
                } else if (prevPVal === 1) {
                    if (src > prevSVal && prevSrcVal > prevSVal) {
                        newS = Math.max(prevSVal, src - nLoss);
                    } else if (src > prevSVal) {
                        newS = src - nLoss;
                    } else {
                        newS = src + nLoss;
                        p = -1;
                    }
                } else if (prevPVal === -1) {
                    if (src < prevSVal && prevSrcVal < prevSVal) {
                        newS = Math.min(prevSVal, src + nLoss);
                    } else if (src < prevSVal) {
                        newS = src + nLoss;
                    } else {
                        newS = src - nLoss;
                        p = 1;
                    }
                }
                s = newS;
            }

            // التحقق من إشارة الشراء: src يعبر فوق الـ stop وكان اتجاهه صاعد
            let signal = null;
            const currSrc = srcArray[srcArray.length - 1];
            const prevSrc2 = srcArray.length > 1 ? srcArray[srcArray.length - 2] : currSrc;
            // نحتاج الـ stop للشمعة السابقة.
            // نعيد الحساب ولكن نأخذ القيم السابقة
            let p2 = 0,
                s2 = 0;
            let prevStop2 = 0,
                currStop2 = 0;
            for (let i = 0; i < srcArray.length; i++) {
                const src = srcArray[i];
                const prevSrcV = i > 0 ? srcArray[i - 1] : src;
                const prevSV = s2;
                const prevPV = p2;
                if (i === srcArray.length - 1) { currStop2 = s2; }
                if (i === srcArray.length - 2) { prevStop2 = s2; }
                let newS = 0;
                if (prevPV === 0) {
                    newS = src - nLoss;
                    p2 = 1;
                } else if (prevPV === 1) {
                    if (src > prevSV && prevSrcV > prevSV) {
                        newS = Math.max(prevSV, src - nLoss);
                    } else if (src > prevSV) {
                        newS = src - nLoss;
                    } else {
                        newS = src + nLoss;
                        p2 = -1;
                    }
                } else if (prevPV === -1) {
                    if (src < prevSV && prevSrcV < prevSV) {
                        newS = Math.min(prevSV, src + nLoss);
                    } else if (src < prevSV) {
                        newS = src + nLoss;
                    } else {
                        newS = src - nLoss;
                        p2 = 1;
                    }
                }
                s2 = newS;
            }

            // التقاطع
            const isBuy = currSrc > currStop2 && prevSrc2 <= prevStop2 && p2 === 1;
            const isSell = currSrc < currStop2 && prevSrc2 >= prevStop2 && p2 === -1;

            return {
                pos: p2,
                stop: currStop2,
                src: currSrc,
                buy: isBuy,
                sell: isSell
            };
        }

        // ---------- إشارة الاستراتيجية ----------
        function generateSignal(symbol, candles) {
            if (candles.length < 30) return null;
            const adx = calcADX(candles);
            if (adx < ADX_THRESHOLD) return null;
            const ut = calcUTBot(candles);
            if (ut.buy) {
                return { side: 'buy', price: ut.src, timestamp: candles[candles.length - 1].time };
            }
            if (ut.sell) {
                return { side: 'sell', price: ut.src, timestamp: candles[candles.length - 1].time };
            }
            return null;
        }

        // ---------- إدارة الصفقات ----------
        function manageTrade(symbol, candles, signal) {
            if (!signal) return;
            const price = signal.price;
            const side = signal.side;
            const ut = calcUTBot(candles);

            // إذا كانت هناك صفقة مفتوحة
            if (activeTrade) {
                // إلغاء الإشارة عند تغير الاتجاه (عكس الصفقة)
                if ((activeTrade.side === 'buy' && ut.pos === -1) ||
                    (activeTrade.side === 'sell' && ut.pos === 1)) {
                    const closePrice = candles[candles.length - 1].close;
                    const pnl = (activeTrade.side === 'buy') ? (closePrice - activeTrade.entryPrice) / activeTrade.entryPrice :
                        (activeTrade.entryPrice - closePrice) / activeTrade.entryPrice;
                    trades.push({
                        symbol: activeTrade.symbol,
                        side: activeTrade.side,
                        entry: activeTrade.entryPrice,
                        exit: closePrice,
                        pnl: pnl,
                        timestamp: Date.now()
                    });
                    activeTrade = null;
                    updateUI();
                    sendTelegramAlert(symbol, 'إغلاق (عكس اتجاه)', closePrice);
                }

                // التحقق من وقف الخسارة / الهدف
                if (activeTrade) {
                    const current = candles[candles.length - 1].close;
                    const sl = activeTrade.stopLoss;
                    const tp = activeTrade.takeProfit;
                    let closed = false;
                    if (activeTrade.side === 'buy') {
                        if (current <= sl) {
                            trades.push({ symbol, side: 'buy', entry: activeTrade.entryPrice, exit: current, pnl: -STOP_LOSS_PCT,
                                timestamp: Date.now() });
                            closed = true;
                        } else if (current >= tp) {
                            trades.push({ symbol, side: 'buy', entry: activeTrade.entryPrice, exit: current, pnl: TAKE_PROFIT_PCT,
                                timestamp: Date.now() });
                            closed = true;
                        }
                    } else {
                        if (current >= sl) {
                            trades.push({ symbol, side: 'sell', entry: activeTrade.entryPrice, exit: current, pnl: -STOP_LOSS_PCT,
                                timestamp: Date.now() });
                            closed = true;
                        } else if (current <= tp) {
                            trades.push({ symbol, side: 'sell', entry: activeTrade.entryPrice, exit: current, pnl: TAKE_PROFIT_PCT,
                                timestamp: Date.now() });
                            closed = true;
                        }
                    }
                    if (closed) {
                        activeTrade = null;
                        updateUI();
                    }
                }
            } else {
                // فتح صفقة جديدة
                const entryPrice = price;
                const sl = side === 'buy' ? entryPrice * (1 - STOP_LOSS_PCT) : entryPrice * (1 + STOP_LOSS_PCT);
                const tp = side === 'buy' ? entryPrice * (1 + TAKE_PROFIT_PCT) : entryPrice * (1 - TAKE_PROFIT_PCT);
                activeTrade = { symbol, side, entryPrice, stopLoss: sl, takeProfit: tp, timestamp: Date.now() };
                sendTelegramAlert(symbol, side === 'buy' ? 'شراء' : 'بيع', entryPrice);
                updateUI();
            }
        }

        // ---------- محاكاة تيليجرام ----------
        function sendTelegramAlert(symbol, action, price) {
            const msg = `🚨 إشارة ${action} على ${symbol}\nالسعر: ${formatPrice(price)}\nالوقت: ${new Date().toLocaleString('ar-EG')}`;
            const log = document.getElementById('tradeLog');
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML =
                `<span>📨 ${msg}</span><span class="${action === 'شراء' || action === 'buy' ? 'side-buy' : 'side-sell'}">${action === 'شراء' || action === 'buy' ? '🟢' : '🔴'}</span>`;
            log.prepend(entry);
        }

        // ---------- WebSocket Binance ----------
        function connectWebSocket() {
            if (ws) ws.close();
            const streams = SYMBOLS.map(s => `${s.toLowerCase()}@kline_${TIMEFRAME}`).join('/');
            const url = `wss://stream.binance.com:9443/ws/${streams}`;
            ws = new WebSocket(url);
            ws.onopen = () => {
                document.getElementById('connectionStatus').innerHTML = '🟢 متصل';
                document.getElementById('statusText').textContent = 'متصل بـ Binance';
                document.getElementById('statusDot').className = 'dot green';
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.e === 'kline') {
                    const sym = data.s;
                    const k = data.k;
                    const candle = {
                        time: k.t,
                        open: parseFloat(k.o),
                        high: parseFloat(k.h),
                        low: parseFloat(k.l),
                        close: parseFloat(k.c),
                        volume: parseFloat(k.v)
                    };
                    if (!marketData[sym]) {
                        marketData[sym] = { candles: [] };
                    }
                    if (k.x) {
                        marketData[sym].candles.push(candle);
                        if (marketData[sym].candles.length > MAX_CANDLES) {
                            marketData[sym].candles.shift();
                        }
                        if (sym === activeSymbol) {
                            processNewCandle(sym);
                            drawChart(sym);
                        }
                        updateCoinCard(sym);
                        if (isAutoScan) {
                            scanAllSymbols();
                        }
                    } else {
                        const arr = marketData[sym].candles;
                        if (arr.length > 0) {
                            arr[arr.length - 1] = candle;
                        } else {
                            arr.push(candle);
                        }
                        if (sym === activeSymbol) {
                            drawChart(sym);
                        }
                    }
                }
            };
            ws.onerror = (err) => {
                console.error('WebSocket error', err);
                document.getElementById('connectionStatus').innerHTML = '🔴 خطأ';
                document.getElementById('statusDot').className = 'dot red';
            };
            ws.onclose = () => {
                document.getElementById('connectionStatus').innerHTML = '🔴 غير متصل';
                document.getElementById('statusDot').className = 'dot red';
                setTimeout(connectWebSocket, 5000);
            };
        }

        // ---------- معالجة شمعة جديدة ----------
        function processNewCandle(symbol) {
            const data = marketData[symbol];
            if (!data || data.candles.length < 30) return;
            const signal = generateSignal(symbol, data.candles);
            if (signal) {
                manageTrade(symbol, data.candles, signal);
                updateUI();
            }
        }

        // ---------- مسح تلقائي ----------
        function scanAllSymbols() {
            for (const sym of SYMBOLS) {
                const data = marketData[sym];
                if (!data || data.candles.length < 30) continue;
                const signal = generateSignal(sym, data.candles);
                if (signal && sym === activeSymbol) {
                    manageTrade(sym, data.candles, signal);
                }
                if (signal) {
                    const card = document.querySelector(`.coin-card[data-symbol="${sym}"]`);
                    if (card) {
                        const badge = card.querySelector('.signal-badge');
                        badge.textContent = signal.side === 'buy' ? 'شراء' : 'بيع';
                        badge.className = `signal-badge ${signal.side === 'buy' ? 'buy' : 'sell'}`;
                    }
                }
            }
        }

        // ---------- رسم الشموع ----------
        function drawChart(symbol) {
            const data = marketData[symbol];
            if (!data || data.candles.length < 2) return;
            const candles = data.candles;
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 24;
            canvas.height = rect.height - 24;
            const w = canvas.width,
                h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            const high = Math.max(...candles.map(c => c.high)) * 1.02;
            const low = Math.min(...candles.map(c => c.low)) * 0.98;
            const range = high - low || 1;
            const padding = 10;
            const chartHeight = h - 2 * padding;
            const chartWidth = w - 2 * padding;
            const candleWidth = chartWidth / candles.length;

            ctx.fillStyle = '#0f1622';
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = '#1a2335';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = padding + (chartHeight * i) / 4;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(w - padding, y);
                ctx.stroke();
            }

            // رسم الشموع
            for (let i = 0; i < candles.length; i++) {
                const c = candles[i];
                const x = padding + i * candleWidth;
                const yHigh = padding + (high - c.high) / range * chartHeight;
                const yLow = padding + (high - c.low) / range * chartHeight;
                const yOpen = padding + (high - c.open) / range * chartHeight;
                const yClose = padding + (high - c.close) / range * chartHeight;
                const isBull = c.close >= c.open;
                ctx.fillStyle = isBull ? '#00cc88' : '#ff4477';
                ctx.strokeStyle = isBull ? '#00cc88' : '#ff4477';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, yHigh);
                ctx.lineTo(x + candleWidth / 2, yLow);
                ctx.stroke();
                const top = Math.min(yOpen, yClose);
                const bottom = Math.max(yOpen, yClose);
                const bodyHeight = Math.max(bottom - top, 1);
                ctx.fillRect(x + 1, top, candleWidth - 2, bodyHeight);
            }

            // رسم خط UT Bot Trailing Stop
            const ut = calcUTBot(candles);
            if (ut.stop > 0) {
                const yStop = padding + (high - ut.stop) / range * chartHeight;
                ctx.strokeStyle = ut.pos === 1 ? '#00ffcc' : '#ff007f';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(padding, yStop);
                ctx.lineTo(w - padding, yStop);
                ctx.stroke();
            }

            document.getElementById('chartInfo').textContent = `${symbol} · ${TIMEFRAME}`;
        }

        // ---------- تحديث بطاقة العملة ----------
        function updateCoinCard(symbol) {
            const data = marketData[symbol];
            if (!data || data.candles.length === 0) return;
            const last = data.candles[data.candles.length - 1];
            const prev = data.candles.length > 1 ? data.candles[data.candles.length - 2] : last;
            const change = ((last.close - prev.close) / prev.close * 100);
            const card = document.querySelector(`.coin-card[data-symbol="${symbol}"]`);
            if (card) {
                card.querySelector('.price').textContent = formatPrice(last.close);
                const changeEl = card.querySelector('.change');
                changeEl.textContent = `${change > 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeEl.style.color = change >= 0 ? '#00cc88' : '#ff4477';
            }
        }

        // ---------- بناء واجهة العملات ----------
        function buildCoinGrid() {
            const grid = document.getElementById('coinGrid');
            grid.innerHTML = '';
            SYMBOLS.forEach(sym => {
                const card = document.createElement('div');
                card.className = 'coin-card' + (sym === activeSymbol ? ' active' : '');
                card.dataset.symbol = sym;
                card.innerHTML = `
                    <div class="symbol">${sym}</div>
                    <div class="price">---</div>
                    <div class="change">0.00%</div>
                    <div class="signal-badge">-</div>
                `;
                card.addEventListener('click', () => {
                    activeSymbol = sym;
                    document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    drawChart(sym);
                    if (!marketData[sym] || marketData[sym].candles.length < 30) {
                        loadHistorical(sym);
                    }
                });
                grid.appendChild(card);
            });
        }

        // ---------- تحميل البيانات التاريخية ----------
        async function loadHistorical(symbol = activeSymbol) {
            const limit = 200;
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${TIMEFRAME}&limit=${limit}`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const candles = data.map(k => ({
                    time: k[0],
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4]),
                    volume: parseFloat(k[5])
                }));
                if (!marketData[symbol]) marketData[symbol] = { candles: [] };
                marketData[symbol].candles = candles;
                drawChart(symbol);
                updateCoinCard(symbol);
                document.getElementById('statusText').textContent = `تم تحميل ${candles.length} شمعة لـ ${symbol}`;
            } catch (err) {
                console.error('فشل تحميل التاريخ', err);
            }
        }

        // ---------- تحديث واجهة الإحصائيات ----------
        function updateUI() {
            const total = trades.length + (activeTrade ? 1 : 0);
            document.getElementById('totalTrades').textContent = total;
            const wins = trades.filter(t => t.pnl > 0).length;
            const winRate = trades.length > 0 ? (wins / trades.length * 100) : 0;
            document.getElementById('winRate').textContent = winRate.toFixed(1) + '%';
            const pnl = trades.reduce((s, t) => s + t.pnl, 0) * 100;
            document.getElementById('profitLoss').textContent = pnl.toFixed(2) + '%';
            document.getElementById('activeTrades').textContent = activeTrade ? 1 : 0;

            const log = document.getElementById('tradeLog');
            if (trades.length === 0 && !activeTrade) {
                log.innerHTML = '<div style="color:#5a6f99;text-align:center;padding:20px 0;">لا توجد صفقات بعد</div>';
                return;
            }
            log.innerHTML = '';
            const all = [...trades];
            if (activeTrade) {
                all.push({ symbol: activeTrade.symbol, side: activeTrade.side, entry: activeTrade.entryPrice, exit: 'مفتوحة',
                    pnl: 'جاري', timestamp: Date.now() });
            }
            all.slice(-20).reverse().forEach(t => {
                const div = document.createElement('div');
                div.className = 'entry';
                const sideClass = t.side === 'buy' ? 'side-buy' : 'side-sell';
                const pnlStr = typeof t.pnl === 'number' ? (t.pnl * 100).toFixed(2) + '%' : t.pnl;
                div.innerHTML = `
                    <span>${t.symbol} ${t.side === 'buy' ? '🟢 شراء' : '🔴 بيع'} @ ${formatPrice(t.entry)}</span>
                    <span class="${sideClass}">${pnlStr}</span>
                `;
                log.appendChild(div);
            });
        }

        // ---------- أزرار التحكم ----------
        function toggleAutoScan() {
            isAutoScan = !isAutoScan;
            document.querySelector('.header-actions button:first-child').textContent = isAutoScan ? '🔍 تلقائي' : '🔍 يدوي';
        }

        function shareSignal() {
            if (!activeTrade) {
                alert('لا توجد إشارة حالية للمشاركة.');
                return;
            }
            const msg =
                `🚀 إشارة ${activeTrade.side === 'buy' ? 'شراء' : 'بيع'} على ${activeTrade.symbol}\nالسعر: ${formatPrice(activeTrade.entryPrice)}\nالهدف: ${formatPrice(activeTrade.takeProfit)} | وقف: ${formatPrice(activeTrade.stopLoss)}`;
            if (navigator.share) {
                navigator.share({ title: 'UT Bot Signal', text: msg });
            } else {
                navigator.clipboard.writeText(msg).then(() => alert('تم نسخ الإشارة!'));
            }
        }

        function clearTrades() {
            trades = [];
            activeTrade = null;
            updateUI();
        }

        function exportLog() {
            const data = trades.map(t => `${t.symbol},${t.side},${t.entry},${t.exit},${t.pnl},${new Date(t.timestamp).toISOString()}`)
                .join('\n');
            const blob = new Blob([data], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'trades.csv';
            a.click();
        }

        // ---------- PWA التثبيت ----------
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choice => {
                    if (choice.outcome === 'accepted') {
                        console.log('تم التثبيت');
                    }
                    deferredPrompt = null;
                });
            } else {
                alert('يمكنك تثبيت التطبيق من متصفحك عبر "إضافة إلى الشاشة الرئيسية"');
            }
        }

        // ---------- Service Worker ----------
        function registerSW() {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swURL = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swURL).then(() => console.log('SW مسجل'));
            }
        }

        // ---------- تهيئة التطبيق ----------
        function init() {
            buildCoinGrid();
            registerSW();
            loadHistorical(activeSymbol);
            connectWebSocket();
            setInterval(updateUI, 10000);
            window.addEventListener('resize', () => drawChart(activeSymbol));
            setTimeout(() => {
                if (!marketData[activeSymbol] || marketData[activeSymbol].candles.length < 10) {
                    loadHistorical(activeSymbol);
                }
            }, 5000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
