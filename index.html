<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UT Bot Alerts - BigBeluga</title>
    <link rel="manifest" href="data:application/json,{}" id="manifest">
    <meta name="theme-color" content="#0b0e17">
    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0b0e17;
            color: #e0e6f0;
            overflow-x: hidden;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 1300px;
            width: 100%;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1f2e; }
        ::-webkit-scrollbar-thumb { background: #3b4a6b; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #5a6f99; }

        /* ========== HEADER ========== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: #111827;
            border-radius: 16px;
            border: 1px solid #1f2a3f;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #00ffcc, #00b8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span {
            background: #1f2a3f;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            -webkit-text-fill-color: #8ba0d2;
            background: #1a2335;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: #1f2a3f;
            border: none;
            color: #b0c5e5;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button:hover { background: #2b3957; color: white; }
        .badge {
            background: #1f2a3f;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #8ba0d2;
        }

        /* ========== COIN GRID ========== */
        .coin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .coin-card {
            background: #111827;
            border: 1px solid #1f2a3f;
            border-radius: 14px;
            padding: 12px 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            position: relative;
        }
        .coin-card.active { border-color: #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.08); }
        .coin-card .symbol { font-weight: 600; font-size: 0.9rem; }
        .coin-card .price { font-size: 1.1rem; font-weight: 700; margin: 4px 0 2px; }
        .coin-card .change { font-size: 0.8rem; }
        .coin-card .signal-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #1f2a3f;
        }
        .signal-badge.buy { background: #00cc88; color: #0b0e17; }
        .signal-badge.sell { background: #ff4477; color: #0b0e17; }

        /* ========== CHART ========== */
        .chart-container {
            background: #111827;
            border-radius: 16px;
            border: 1px solid #1f2a3f;
            padding: 12px;
            margin-bottom: 20px;
            position: relative;
            height: 420px;
        }
        .chart-container canvas { width: 100% !important; height: 100% !important; border-radius: 8px; }
        .chart-controls {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .chart-controls select, .chart-controls input {
            background: #1a2335;
            border: 1px solid #2a3a55;
            color: #e0e6f0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .chart-controls button {
            background: #1f2a3f;
            border: none;
            color: #b0c5e5;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .chart-controls button:hover { background: #2b3957; color: white; }

        /* ========== STATS & LOG ========== */
        .stats-log {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 700px) { .stats-log { grid-template-columns: 1fr; } }
        .panel {
            background: #111827;
            border: 1px solid #1f2a3f;
            border-radius: 16px;
            padding: 16px;
        }
        .panel h3 {
            font-size: 0.9rem;
            color: #8ba0d2;
            margin-bottom: 12px;
            border-bottom: 1px solid #1f2a3f;
            padding-bottom: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-item {
            background: #0f1622;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-item .value { font-size: 1.4rem; font-weight: 700; }
        .stat-item .label { font-size: 0.7rem; color: #8ba0d2; }
        .trade-log { max-height: 200px; overflow-y: auto; font-size: 0.8rem; }
        .trade-log .entry {
            padding: 6px 0;
            border-bottom: 1px solid #1a2335;
            display: flex;
            justify-content: space-between;
        }
        .trade-log .entry .side-buy { color: #00cc88; }
        .trade-log .entry .side-sell { color: #ff4477; }

        /* ========== BOTTOM BAR ========== */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: #111827;
            border-radius: 16px;
            border: 1px solid #1f2a3f;
            padding: 12px 20px;
            margin-top: 10px;
        }
        .bottom-bar .status { font-size: 0.8rem; color: #8ba0d2; }
        .bottom-bar .status .dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
        }
        .dot.green { background: #00cc88; }
        .dot.red { background: #ff4477; }
        .bottom-bar button {
            background: #1f2a3f; border: none; color: #b0c5e5; padding: 6px 18px;
            border-radius: 30px; cursor: pointer; font-size: 0.8rem;
        }
        .bottom-bar button:hover { background: #2b3957; color: white; }

        @media (max-width: 480px) {
            .coin-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .chart-container { height: 280px; }
            .header-actions button { padding: 4px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <header>
            <div class="logo">📊 UT Bot <span>v3.2</span></div>
            <div class="header-actions">
                <button onclick="toggleAutoScan()">🔍 تلقائي</button>
                <button onclick="shareSignal()">📤 مشاركة</button>
                <button onclick="installPWA()">📲 تثبيت</button>
                <span class="badge" id="connectionStatus">🟢 متصل</span>
            </div>
        </header>

        <div class="coin-grid" id="coinGrid"></div>

        <div class="chart-container">
            <canvas id="chartCanvas"></canvas>
            <div class="chart-controls">
                <select id="timeframeSelect">
                    <option value="30">30 دقيقة</option>
                    <option value="60">1 ساعة</option>
                    <option value="240">4 ساعات</option>
                    <option value="D">يوم</option>
                </select>
                <button onclick="loadHistorical()">📥 تحميل التاريخ</button>
                <span style="font-size:0.75rem;color:#8ba0d2;margin-right:auto;" id="chartInfo">BTCUSDT · 30m</span>
            </div>
        </div>

        <div class="stats-log">
            <div class="panel">
                <h3>📈 الإحصائيات</h3>
                <div class="stats-grid">
                    <div class="stat-item"><div class="value" id="totalTrades">0</div><div class="label">إجمالي الصفقات</div></div>
                    <div class="stat-item"><div class="value" id="winRate">0%</div><div class="label">نسبة النجاح</div></div>
                    <div class="stat-item"><div class="value" id="profitLoss">0</div><div class="label">الربح/الخسارة</div></div>
                    <div class="stat-item"><div class="value" id="activeTrades">0</div><div class="label">صفقات مفتوحة</div></div>
                </div>
            </div>
            <div class="panel">
                <h3>📜 سجل الصفقات</h3>
                <div class="trade-log" id="tradeLog">
                    <div style="color:#5a6f99;text-align:center;padding:20px 0;">لا توجد صفقات بعد</div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="status">
                <span class="dot green" id="statusDot"></span>
                <span id="statusText">جاري التحميل...</span>
            </div>
            <div>
                <button onclick="clearTrades()">🗑️ مسح السجل</button>
                <button onclick="exportLog()">📥 تصدير</button>
            </div>
        </div>
    </div>

    <script>
        /* =================================================================
           UT Bot Alerts Strategy - خوارزمية محسنة للحصول على صفقات فورية
           الإعدادات الجديدة: ADX 20, UT_A 0.8
           ================================================================= */

        const SYMBOLS = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'XRPUSDT', 'ADAUSDT', 'DOGEUSDT', 'AVAXUSDT', 'DOTUSDT', 'MATICUSDT'];
        const TIMEFRAME = '30m';
        
        // ⚠️ تم تخفيض ADX من 25 إلى 20 لظهور الصفقات في السوق الحالي
        const ADX_THRESHOLD = 20; 
        
        // ⚠️ تم تخفيض الحساسية من 1.0 إلى 0.8 لالتقاط المزيد من الإشارات
        const UT_A = 0.8; 
        const UT_C = 10;
        
        const STOP_LOSS_PCT = 0.005;
        const TAKE_PROFIT_PCT = 0.02;
        const MAX_CANDLES = 300;

        let activeSymbol = 'BTCUSDT';
        let marketData = {};
        let trades = [];
        let activeTrade = null;
        let isAutoScan = true;
        let ws = null;

        // ---------- دوال الحسابات الأساسية ----------
        function calcATR(candles, period) {
            if (candles.length < period + 1) return 0;
            let tr = [];
            for (let i = 1; i < candles.length; i++) {
                const h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
                tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            let atr = tr.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < tr.length; i++) {
                atr = (atr * (period - 1) + tr[i]) / period;
            }
            return atr;
        }

        function calcADX(candles, period = 14) {
            if (candles.length < period + 2) return 0;
            let tr = [], plusDM = [], minusDM = [];
            for (let i = 1; i < candles.length; i++) {
                const h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
                tr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
                const up = h - candles[i-1].high;
                const down = candles[i-1].low - l;
                plusDM.push(up > down && up > 0 ? up : 0);
                minusDM.push(down > up && down > 0 ? down : 0);
            }
            let atr = tr.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let pdi = plusDM.slice(0, period).reduce((a, b) => a + b, 0) / period;
            let mdi = minusDM.slice(0, period).reduce((a, b) => a + b, 0) / period;
            for (let i = period; i < tr.length; i++) {
                atr = (atr * (period - 1) + tr[i]) / period;
                pdi = (pdi * (period - 1) + plusDM[i]) / period;
                mdi = (mdi * (period - 1) + minusDM[i]) / period;
            }
            const dx = (pdi + mdi === 0) ? 0 : Math.abs(pdi - mdi) / (pdi + mdi) * 100;
            let adx = dx;
            for (let i = period + 1; i < tr.length; i++) {
                const dx2 = (pdi + mdi === 0) ? 0 : Math.abs(pdi - mdi) / (pdi + mdi) * 100;
                adx = (adx * (period - 1) + dx2) / period;
            }
            return adx;
        }

        // ---------- UT Bot Logic (محاكاة دقيقة لـ Pine Script) ----------
        function calcUT(candles) {
            if (candles.length < UT_C + 2) return null;
            const atr = calcATR(candles, UT_C);
            if (atr === 0) return null;
            const nLoss = UT_A * atr;
            const src = candles.map(c => c.close);
            let stops = [];
            let positions = [];

            let stop = src[0] - nLoss;
            let pos = 1;
            stops.push(stop);
            positions.push(pos);

            for (let i = 1; i < src.length; i++) {
                const s = src[i];
                const prevS = src[i-1];
                const prevStop = stops[i-1];
                const prevPos = positions[i-1];

                if (prevPos === 1) {
                    if (prevS > prevStop) {
                        stop = Math.max(prevStop, s - nLoss);
                    } else {
                        stop = s - nLoss;
                    }
                    if (s < stop) {
                        pos = -1;
                        stop = s + nLoss;
                    }
                } else if (prevPos === -1) {
                    if (prevS < prevStop) {
                        stop = Math.min(prevStop, s + nLoss);
                    } else {
                        stop = s + nLoss;
                    }
                    if (s > stop) {
                        pos = 1;
                        stop = s - nLoss;
                    }
                } else {
                    stop = s - nLoss;
                    pos = 1;
                }
                stops.push(stop);
                positions.push(pos);
            }

            const lastIdx = src.length - 1;
            const prevIdx = src.length - 2;
            const currentSrc = src[lastIdx];
            const prevSrc = src[prevIdx];
            const currentStop = stops[lastIdx];
            const prevStop = stops[prevIdx];
            const currentPos = positions[lastIdx];

            // كشف التقاطع: 
            // شراء: السعر الحالي فوق الخط، والسعر السابق كان تحت أو عند الخط
            // بيع: السعر الحالي تحت الخط، والسعر السابق كان فوق أو عند الخط
            let buy = false, sell = false;
            if (prevSrc <= prevStop && currentSrc > currentStop) {
                buy = true;
            }
            if (prevSrc >= prevStop && currentSrc < currentStop) {
                sell = true;
            }

            return {
                pos: currentPos,
                stop: currentStop,
                src: currentSrc,
                buy: buy,
                sell: sell
            };
        }

        // ---------- إشارة الاستراتيجية ----------
        function generateSignal(symbol, candles) {
            if (candles.length < 30) return null;
            const adx = calcADX(candles);
            if (adx < ADX_THRESHOLD) {
                // ستظهر هذه الرسالة في الكونسول إذا لم تعطِ صفقة بسبب ADX
                // console.log(`[${symbol}] تم تخطي الإشارة، ADX = ${adx.toFixed(2)} (أقل من 20)`);
                return null;
            }
            const ut = calcUT(candles);
            if (!ut) return null;

            if (ut.buy) {
                return { side: 'buy', price: ut.src, timestamp: candles[candles.length-1].time };
            }
            if (ut.sell) {
                return { side: 'sell', price: ut.src, timestamp: candles[candles.length-1].time };
            }
            return null;
        }

        // ---------- إدارة الصفقات ----------
        function manageTrade(symbol, candles, signal) {
            if (!signal) return;
            const price = signal.price;
            const side = signal.side;
            const ut = calcUT(candles);
            if (!ut) return;

            if (activeTrade) {
                // إغلاق عند تغير الاتجاه (عكس الإشارة)
                if ((activeTrade.side === 'buy' && ut.pos === -1) || 
                    (activeTrade.side === 'sell' && ut.pos === 1)) {
                    const closePrice = candles[candles.length-1].close;
                    const pnl = (activeTrade.side === 'buy') ? (closePrice - activeTrade.entryPrice) / activeTrade.entryPrice :
                                                               (activeTrade.entryPrice - closePrice) / activeTrade.entryPrice;
                    trades.push({ symbol, side: activeTrade.side, entry: activeTrade.entryPrice, exit: closePrice, pnl, timestamp: Date.now() });
                    activeTrade = null;
                    updateUI();
                }

                // وقف الخسارة والهدف
                if (activeTrade) {
                    const current = candles[candles.length-1].close;
                    const sl = activeTrade.stopLoss;
                    const tp = activeTrade.takeProfit;
                    let closed = false;
                    if (activeTrade.side === 'buy') {
                        if (current <= sl) { trades.push({ symbol, side:'buy', entry:activeTrade.entryPrice, exit:current, pnl:-STOP_LOSS_PCT, timestamp:Date.now() }); closed = true; }
                        else if (current >= tp) { trades.push({ symbol, side:'buy', entry:activeTrade.entryPrice, exit:current, pnl:TAKE_PROFIT_PCT, timestamp:Date.now() }); closed = true; }
                    } else {
                        if (current >= sl) { trades.push({ symbol, side:'sell', entry:activeTrade.entryPrice, exit:current, pnl:-STOP_LOSS_PCT, timestamp:Date.now() }); closed = true; }
                        else if (current <= tp) { trades.push({ symbol, side:'sell', entry:activeTrade.entryPrice, exit:current, pnl:TAKE_PROFIT_PCT, timestamp:Date.now() }); closed = true; }
                    }
                    if (closed) { activeTrade = null; updateUI(); }
                }
            } else {
                // فتح صفقة جديدة
                const entryPrice = price;
                const sl = side === 'buy' ? entryPrice * (1 - STOP_LOSS_PCT) : entryPrice * (1 + STOP_LOSS_PCT);
                const tp = side === 'buy' ? entryPrice * (1 + TAKE_PROFIT_PCT) : entryPrice * (1 - TAKE_PROFIT_PCT);
                activeTrade = { symbol, side, entryPrice, stopLoss: sl, takeProfit: tp, timestamp: Date.now() };
                sendTelegramAlert(symbol, side === 'buy' ? 'شراء 🟢' : 'بيع 🔴', entryPrice);
                updateUI();
            }
        }

        function sendTelegramAlert(symbol, action, price) {
            const log = document.getElementById('tradeLog');
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML = `<span>📨 ${action} على ${symbol} @ ${formatPrice(price)}</span><span class="${action.includes('شراء') ? 'side-buy' : 'side-sell'}">${action.includes('شراء') ? '🟢' : '🔴'}</span>`;
            log.prepend(entry);
        }

        // ---------- واجهة المستخدم و WebSocket ----------
        function connectWebSocket() {
            if (ws) ws.close();
            const streams = SYMBOLS.map(s => `${s.toLowerCase()}@kline_${TIMEFRAME}`).join('/');
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);
            ws.onopen = () => {
                document.getElementById('connectionStatus').innerHTML = '🟢 متصل';
                document.getElementById('statusDot').className = 'dot green';
            };
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.e === 'kline') {
                    const sym = data.s;
                    const k = data.k;
                    const candle = {
                        time: k.t, open: parseFloat(k.o), high: parseFloat(k.h),
                        low: parseFloat(k.l), close: parseFloat(k.c), volume: parseFloat(k.v)
                    };
                    if (!marketData[sym]) marketData[sym] = { candles: [] };
                    
                    if (k.x) { // شمعة مغلقة
                        marketData[sym].candles.push(candle);
                        if (marketData[sym].candles.length > MAX_CANDLES) marketData[sym].candles.shift();
                        
                        if (sym === activeSymbol) {
                            processNewCandle(sym);
                            drawChart(sym);
                        }
                        updateCoinCard(sym);
                        if (isAutoScan) scanAllSymbols();
                    } else { // شمعة مفتوحة للتحديث
                        const arr = marketData[sym].candles;
                        if (arr.length > 0) arr[arr.length - 1] = candle;
                        else arr.push(candle);
                        if (sym === activeSymbol) drawChart(sym);
                    }
                }
            };
            ws.onclose = () => { setTimeout(connectWebSocket, 5000); };
        }

        function processNewCandle(symbol) {
            const data = marketData[symbol];
            if (!data || data.candles.length < 30) return;
            const signal = generateSignal(symbol, data.candles);
            if (signal) {
                manageTrade(symbol, data.candles, signal);
                updateUI();
            }
        }

        function scanAllSymbols() {
            for (const sym of SYMBOLS) {
                const data = marketData[sym];
                if (!data || data.candles.length < 30) continue;
                const signal = generateSignal(sym, data.candles);
                if (signal) {
                    const card = document.querySelector(`.coin-card[data-symbol="${sym}"]`);
                    if (card) {
                        const badge = card.querySelector('.signal-badge');
                        badge.textContent = signal.side === 'buy' ? 'شراء' : 'بيع';
                        badge.className = `signal-badge ${signal.side === 'buy' ? 'buy' : 'sell'}`;
                    }
                }
            }
        }

        // ---------- رسم الشموع ----------
        function drawChart(symbol) {
            const data = marketData[symbol];
            if (!data || data.candles.length < 2) return;
            const candles = data.candles;
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 24; canvas.height = rect.height - 24;
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            const high = Math.max(...candles.map(c => c.high)) * 1.02;
            const low = Math.min(...candles.map(c => c.low)) * 0.98;
            const range = high - low || 1;
            const padding = 10, chartHeight = h - 2 * padding, chartWidth = w - 2 * padding;
            const candleWidth = chartWidth / candles.length;

            ctx.fillStyle = '#0f1622'; ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = '#1a2335'; ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = padding + (chartHeight * i) / 4;
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(w - padding, y); ctx.stroke();
            }

            for (let i = 0; i < candles.length; i++) {
                const c = candles[i];
                const x = padding + i * candleWidth;
                const yHigh = padding + (high - c.high) / range * chartHeight;
                const yLow = padding + (high - c.low) / range * chartHeight;
                const yOpen = padding + (high - c.open) / range * chartHeight;
                const yClose = padding + (high - c.close) / range * chartHeight;
                const isBull = c.close >= c.open;
                ctx.fillStyle = isBull ? '#00cc88' : '#ff4477'; ctx.strokeStyle = isBull ? '#00cc88' : '#ff4477';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(x + candleWidth / 2, yHigh); ctx.lineTo(x + candleWidth / 2, yLow); ctx.stroke();
                const top = Math.min(yOpen, yClose), bottom = Math.max(yOpen, yClose);
                ctx.fillRect(x + 1, top, candleWidth - 2, Math.max(bottom - top, 1));
            }

            // رسم خط UT Bot
            const ut = calcUT(candles);
            if (ut && ut.stop > 0) {
                const yStop = padding + (high - ut.stop) / range * chartHeight;
                ctx.strokeStyle = ut.pos === 1 ? '#00ffcc' : '#ff007f';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(padding, yStop); ctx.lineTo(w - padding, yStop); ctx.stroke();
            }
            document.getElementById('chartInfo').textContent = `${symbol} · ${TIMEFRAME}`;
        }

        // ---------- بطاقات العملات ----------
        function updateCoinCard(symbol) {
            const data = marketData[symbol];
            if (!data || data.candles.length === 0) return;
            const last = data.candles[data.candles.length - 1];
            const prev = data.candles.length > 1 ? data.candles[data.candles.length - 2] : last;
            const change = ((last.close - prev.close) / prev.close * 100);
            const card = document.querySelector(`.coin-card[data-symbol="${symbol}"]`);
            if (card) {
                card.querySelector('.price').textContent = formatPrice(last.close);
                const changeEl = card.querySelector('.change');
                changeEl.textContent = `${change > 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeEl.style.color = change >= 0 ? '#00cc88' : '#ff4477';
            }
        }

        function buildCoinGrid() {
            const grid = document.getElementById('coinGrid');
            grid.innerHTML = '';
            SYMBOLS.forEach(sym => {
                const card = document.createElement('div');
                card.className = 'coin-card' + (sym === activeSymbol ? ' active' : '');
                card.dataset.symbol = sym;
                card.innerHTML = `<div class="symbol">${sym}</div><div class="price">---</div><div class="change">0.00%</div><div class="signal-badge">-</div>`;
                card.addEventListener('click', () => {
                    activeSymbol = sym;
                    document.querySelectorAll('.coin-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    drawChart(sym);
                    if (!marketData[sym] || marketData[sym].candles.length < 30) loadHistorical(sym);
                });
                grid.appendChild(card);
            });
        }

        async function loadHistorical(symbol = activeSymbol) {
            const limit = 200;
            try {
                const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${TIMEFRAME}&limit=${limit}`);
                const data = await resp.json();
                const candles = data.map(k => ({
                    time: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]),
                    low: parseFloat(k[3]), close: parseFloat(k[4]), volume: parseFloat(k[5])
                }));
                if (!marketData[symbol]) marketData[symbol] = { candles: [] };
                marketData[symbol].candles = candles;
                drawChart(symbol);
                updateCoinCard(symbol);
                document.getElementById('statusText').textContent = `تم تحميل ${candles.length} شمعة لـ ${symbol}`;
            } catch (err) { console.error('فشل تحميل التاريخ', err); }
        }

        // ---------- إحصائيات وواجهة ----------
        function formatPrice(p) { return p.toFixed(2); }

        function updateUI() {
            const total = trades.length + (activeTrade ? 1 : 0);
            document.getElementById('totalTrades').textContent = total;
            const wins = trades.filter(t => t.pnl > 0).length;
            document.getElementById('winRate').textContent = trades.length > 0 ? (wins / trades.length * 100).toFixed(1) + '%' : '0%';
            const pnl = trades.reduce((s, t) => s + t.pnl, 0) * 100;
            document.getElementById('profitLoss').textContent = pnl.toFixed(2) + '%';
            document.getElementById('activeTrades').textContent = activeTrade ? 1 : 0;

            const log = document.getElementById('tradeLog');
            if (trades.length === 0 && !activeTrade) {
                log.innerHTML = '<div style="color:#5a6f99;text-align:center;padding:20px 0;">لا توجد صفقات بعد</div>';
                return;
            }
            log.innerHTML = '';
            const all = [...trades];
            if (activeTrade) all.push({ symbol: activeTrade.symbol, side: activeTrade.side, entry: activeTrade.entryPrice, exit: 'مفتوحة', pnl: 'جاري', timestamp: Date.now() });
            all.slice(-20).reverse().forEach(t => {
                const div = document.createElement('div');
                div.className = 'entry';
                const sideClass = t.side === 'buy' ? 'side-buy' : 'side-sell';
                const pnlStr = typeof t.pnl === 'number' ? (t.pnl * 100).toFixed(2) + '%' : t.pnl;
                div.innerHTML = `<span>${t.symbol} ${t.side === 'buy' ? '🟢 شراء' : '🔴 بيع'} @ ${formatPrice(t.entry)}</span><span class="${sideClass}">${pnlStr}</span>`;
                log.appendChild(div);
            });
        }

        // ---------- الأزرار و PWA ----------
        function toggleAutoScan() {
            isAutoScan = !isAutoScan;
            document.querySelector('.header-actions button:first-child').textContent = isAutoScan ? '🔍 تلقائي' : '🔍 يدوي';
        }
        function shareSignal() {
            if (!activeTrade) { alert('لا توجد إشارة حالية للمشاركة.'); return; }
            const msg = `🚀 إشارة ${activeTrade.side === 'buy' ? 'شراء' : 'بيع'} على ${activeTrade.symbol}\nالسعر: ${formatPrice(activeTrade.entryPrice)}\nالهدف: ${formatPrice(activeTrade.takeProfit)} | وقف: ${formatPrice(activeTrade.stopLoss)}`;
            if (navigator.share) navigator.share({ title: 'UT Bot Signal', text: msg });
            else navigator.clipboard.writeText(msg).then(() => alert('تم نسخ الإشارة!'));
        }
        function clearTrades() { trades = []; activeTrade = null; updateUI(); }
        function exportLog() {
            const data = trades.map(t => `${t.symbol},${t.side},${t.entry},${t.exit},${t.pnl},${new Date(t.timestamp).toISOString()}`).join('\n');
            const blob = new Blob([data], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'trades.csv'; a.click();
        }
        function installPWA() {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; } 
            else alert('يمكنك تثبيت التطبيق من متصفحك عبر "إضافة إلى الشاشة الرئيسية"');
        }
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

        function init() {
            buildCoinGrid();
            loadHistorical(activeSymbol);
            connectWebSocket();
            setInterval(updateUI, 5000);
            window.addEventListener('resize', () => drawChart(activeSymbol));
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
